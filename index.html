<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e2e2dc;
      --text: #1a1a1a;
      --muted: #888880;
      --accent: #1a1a1a;
      --done-bg: #f0f0ec;
      --done-text: #aaa;
      --danger: #d44;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── VIEWS ── */
    .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .view.active { display: flex; }

    /* ── ADD SCREEN ── */
    #view-add {
      justify-content: center;
      padding: 0 24px;
      gap: 0;
    }

    .add-box {
      display: flex;
      gap: 8px;
    }

    .add-box textarea {
      flex: 1;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 17px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      outline: none;
      background: var(--surface);
      color: var(--text);
      min-height: 54px;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color .15s;
    }

    .add-box textarea:focus { border-color: var(--accent); }
    .add-box textarea::placeholder { color: var(--muted); }

    .add-box button {
      align-self: flex-end;
      padding: 0 20px;
      height: 54px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .add-box button:active { opacity: .75; }

    /* ── RECENTS (below input) ── */
    .recents-wrap {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 40dvh;
      overflow-y: auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .recent-list { display: flex; flex-direction: column; gap: 6px; }

    .recent-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
    }

    .recent-item.done-item { color: var(--done-text); text-decoration: line-through; background: var(--done-bg); }

    /* list link */
    .list-link {
      margin-top: 20px;
      text-align: center;
    }

    .list-link button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color .15s;
    }

    .list-link button:hover { color: var(--text); }

    /* ── LIST SCREEN ── */
    #view-list {
      padding: 0;
    }

    .list-header {
      display: flex;
      align-items: center;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .list-header h1 {
      font-size: 17px;
      font-weight: 600;
      flex: 1;
    }

    .list-header .create-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    .list-header .create-btn:active { opacity: .75; }

    .todo-list { display: flex; flex-direction: column; gap: 8px; padding: 16px; flex: 1; overflow-y: auto; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: background .15s;
    }

    .todo-item.done { background: var(--done-bg); }

    .todo-item .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      margin-top: 1px;
    }

    .todo-item.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check svg { display: none; }
    .todo-item.done .check svg { display: block; }

    .todo-item .text {
      flex: 1;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      transition: color .15s;
    }

    .todo-item.done .text {
      color: var(--done-text);
      text-decoration: line-through;
    }

    .todo-item .del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 18px;
      line-height: 1;
      border-radius: 6px;
      transition: color .15s;
      flex-shrink: 0;
    }

    .todo-item .del:hover { color: var(--danger); }

    /* ── STALE BADGE ── */
    .stale-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .03em;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
      align-self: center;
      white-space: nowrap;
    }

    .stale-fresh  { background: #e6f4ea; color: #2d7a3a; }
    .stale-aging  { background: #fff8e1; color: #8a6600; }
    .stale-stale  { background: #fff0e0; color: #b05000; }
    .stale-dead   { background: #fdecea; color: #b00020; }

    .todo-item.done .stale-badge { opacity: .4; }

    /* ── TODO BODY (text + meta) ── */
    .todo-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .todo-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    /* ── DEADLINE CHIP ── */
    .dl-chip {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .dl-overdue { background: #fdecea; color: #b00020; }
    .dl-today   { background: #fff0e0; color: #b05000; }
    .dl-soon    { background: #fff8e1; color: #8a6600; }
    .dl-future  { background: #e8f0fe; color: #1a56b0; }

    /* ── ACTION CHIP ── */
    .action-chip {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 20px;
      background: #f0f0f8;
      color: #444;
      white-space: nowrap;
    }

    .dl-empty   { background: #f0f0ec; color: var(--muted); font-weight: 500; }
    .action-empty { background: #f0f0ec; color: var(--muted); font-weight: 500; }

    .todo-item.done .dl-chip,
    .todo-item.done .action-chip,
    .todo-item.done .dl-empty,
    .todo-item.done .action-empty { opacity: .4; }

    .todo-item { cursor: pointer; }
    .todo-item:hover { background: #fafaf8; }
    .todo-item.done:hover { background: var(--done-bg); }
    .todo-item .check, .todo-item .del { cursor: pointer; }

    /* ── DETAIL VIEW ── */
    #view-detail { padding: 0; }

    .detail-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      gap: 8px;
    }

    .detail-header .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color .15s;
      white-space: nowrap;
    }

    .detail-header .back-btn:hover { color: var(--text); }

    .detail-header .spacer { flex: 1; }

    .detail-header .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color .15s;
    }

    .detail-header .delete-btn:hover { color: var(--danger); }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .detail-body textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      outline: none;
      background: var(--surface);
      color: var(--text);
      min-height: 80px;
      max-height: 200px;
      overflow-y: auto;
      transition: border-color .15s;
    }

    .detail-body textarea:focus { border-color: var(--accent); }

    .detail-done-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .done-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      transition: background .15s, border-color .15s;
      flex: 1;
      justify-content: center;
    }

    .done-toggle.is-done {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .detail-fields {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field-group input {
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      width: 100%;
      transition: border-color .15s;
    }

    .field-group input:focus { border-color: var(--accent); }

    .field-group textarea {
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      width: 100%;
      resize: none;
      line-height: 1.5;
      min-height: 80px;
      max-height: 200px;
      overflow-y: auto;
      transition: border-color .15s;
    }

    .field-group textarea::placeholder { color: var(--muted); }
    .field-group textarea:focus { border-color: var(--accent); }

    .detail-footer {
      padding: 16px 20px;
      background: var(--bg);
    }

    .save-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    .save-btn:active { opacity: .75; }

    /* ── DREAD SLIDER ── */
    .dread-slider-wrap { display: flex; flex-direction: column; gap: 10px; }

    .dread-slider-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .dread-slider-label .lbl {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dread-score {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
      transition: color .15s;
      color: var(--muted);
    }

    #det-dread {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      outline: none;
      border: none;
      cursor: pointer;
      background: var(--border);
    }

    #det-dread::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #ccc;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
    }

    #det-dread::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #ccc;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
    }

    /* ── DREAD CHIP (list view) ── */
    .dread-chip {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .empty-hint {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 32px 0;
    }
  </style>
</head>
<body>

<!-- LIST VIEW (default) -->
<div id="view-list" class="view active">
  <div class="list-header">
    <h1>Todos</h1>
    <button class="create-btn" onclick="showView('add')">Create</button>
  </div>
  <div class="todo-list" id="all-list">
    <p class="empty-hint" id="list-empty">No todos yet.</p>
  </div>
</div>

<!-- ADD VIEW -->
<div id="view-add" class="view">
  <div class="add-box">
    <textarea id="input" placeholder="What do you need to do?" rows="1" oninput="autosize(this)" onkeydown="enterAdd(event)"></textarea>
    <button onclick="addTodo()">Add</button>
  </div>

  <div class="recents-wrap" id="recents-wrap" style="display:none">
    <span class="section-label">Recents</span>
    <div class="recent-list" id="recents"></div>
  </div>

  <div class="list-link">
    <button onclick="showView('list')">← Back to list</button>
  </div>
</div>

<!-- DETAIL VIEW -->
<div id="view-detail" class="view">
  <div class="detail-header">
    <button class="back-btn" onclick="showView('list')">← Todos</button>
    <div class="spacer"></div>
    <button class="delete-btn" onclick="deleteFromDetail()">Delete</button>
  </div>
  <div class="detail-body">
    <textarea id="det-text" rows="3" oninput="autosize(this)"></textarea>
    <div class="detail-done-row">
      <button class="done-toggle" id="det-done-btn" onclick="toggleDetailDone()">Mark done</button>
    </div>
    <div class="detail-fields">
      <div class="dread-slider-wrap">
        <div class="dread-slider-label">
          <span class="lbl">Dread</span>
          <span class="dread-score" id="det-dread-val">0</span>
        </div>
        <input type="range" id="det-dread" min="0" max="10" step="1" value="0"
               oninput="updateDreadSlider(this.value)">
      </div>
      <div class="field-group">
        <label>Deadline</label>
        <input type="date" id="det-deadline">
      </div>
      <div class="field-group">
        <label>Action start</label>
        <input type="datetime-local" id="det-action-start">
      </div>
      <div class="field-group">
        <label>Duration (minutes)</label>
        <input type="number" id="det-duration" placeholder="e.g. 30" min="5" step="5">
      </div>
      <div class="field-group">
        <label>Notes</label>
        <textarea id="det-notes" placeholder="Any extra context…" oninput="autosize(this)"></textarea>
      </div>
    </div>
  </div>
  <div class="detail-footer">
    <button class="save-btn" onclick="saveDetail()">Save</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://vsliqkdgurlthdvoadnq.supabase.co',
    'sb_publishable_ElNfnqKQC2ClGiMbXgWssw_KrhW-119'
  );

  let todos = [];
  let sessionRecents = [];

  function formatDeadline(dateStr) {
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dateStr + 'T00:00:00');
    const diff = Math.round((due - today) / 86400000);
    if (diff < 0)       return { label: Math.abs(diff) + 'd overdue', cls: 'dl-overdue' };
    if (diff === 0)     return { label: 'Due today',                  cls: 'dl-today'   };
    if (diff <= 3)      return { label: 'Due in ' + diff + 'd',       cls: 'dl-soon'    };
    return { label: 'Due ' + due.toLocaleDateString([], { month: 'short', day: 'numeric' }), cls: 'dl-future' };
  }

  function formatAction(startStr, mins) {
    if (!startStr) return null;
    const d = new Date(startStr);
    const date = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    let dur = '';
    if (mins) {
      const h = Math.floor(mins / 60), m = mins % 60;
      dur = ' · ' + (h && m ? h + 'h ' + m + 'm' : h ? h + 'h' : m + 'min');
    }
    return date + ' · ' + time + dur;
  }

  function dreadColor(val) {
    if (!val) return null;
    const t = val / 10;
    const g = Math.round(220 * (1 - t));
    const b = Math.round(220 * (1 - t));
    return {
      solid: `rgb(255,${g},${b})`,
      bg:    `rgba(255,${g},${b},${0.12 + t * 0.25})`,
      text:  t > 0.55 ? '#7f0000' : '#a00000',
    };
  }

  function updateDreadSlider(val) {
    val = parseInt(val, 10);
    const scoreEl = document.getElementById('det-dread-val');
    const slider  = document.getElementById('det-dread');
    scoreEl.textContent = val;
    const pct = val / 10 * 100;
    if (val === 0) {
      slider.style.background = 'var(--border)';
      scoreEl.style.color = 'var(--muted)';
      return;
    }
    const c = dreadColor(val);
    slider.style.background =
      `linear-gradient(to right, ${c.solid} ${pct}%, var(--border) ${pct}%)`;
    scoreEl.style.color = c.solid;
  }

  function staleBand(touchedAt) {
    const days = (Date.now() - new Date(touchedAt)) / 86400000;
    if (days <= 2)  return { label: 'Fresh',  cls: 'stale-fresh' };
    if (days <= 7)  return { label: 'Aging',  cls: 'stale-aging' };
    if (days <= 14) return { label: 'Stale',  cls: 'stale-stale' };
    return              { label: 'Dead',   cls: 'stale-dead'  };
  }

  async function init() {
    const { data, error } = await db
      .from('todos')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error) todos = data ?? [];
    renderList();
  }

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'list') renderList();
    if (name === 'add') renderRecents();
  }

  function autosize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function enterAdd(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTodo(); }
  }

  async function addTodo() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';

    const { data, error } = await db
      .from('todos')
      .insert({ text, done: false })
      .select()
      .single();
    if (error) { console.error(error); return; }

    todos.unshift(data);
    sessionRecents.unshift(data.id);
    renderRecents();
  }

  function renderRecents() {
    const wrap = document.getElementById('recents-wrap');
    const container = document.getElementById('recents');
    const items = sessionRecents.map(id => todos.find(t => t.id === id)).filter(Boolean);

    if (items.length === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'flex';
    container.innerHTML = '';
    items.forEach(todo => {
      const div = document.createElement('div');
      div.className = 'recent-item' + (todo.done ? ' done-item' : '');
      div.textContent = todo.text;
      container.appendChild(div);
    });
  }

  function renderList() {
    const container = document.getElementById('all-list');
    const empty = document.getElementById('list-empty');
    container.querySelectorAll('.todo-item').forEach(n => n.remove());

    if (todos.length === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';

    const sorted = [...todos].sort((a, b) => {
      if ((b.dread || 0) !== (a.dread || 0)) return (b.dread || 0) - (a.dread || 0);
      const dl_a = a.deadline ? new Date(a.deadline + 'T00:00:00').getTime() : Infinity;
      const dl_b = b.deadline ? new Date(b.deadline + 'T00:00:00').getTime() : Infinity;
      if (dl_a !== dl_b) return dl_a - dl_b;
      const ac_a = a.action_start ? new Date(a.action_start).getTime() : Infinity;
      const ac_b = b.action_start ? new Date(b.action_start).getTime() : Infinity;
      return ac_a - ac_b;
    });

    sorted.forEach(todo => {
      const div = document.createElement('div');
      div.className = 'todo-item' + (todo.done ? ' done' : '');
      if (todo.dread) {
        const dc = dreadColor(todo.dread);
        div.style.boxShadow = `inset 4px 0 0 ${dc.solid}`;
      }

      const check = document.createElement('button');
      check.className = 'check';
      check.innerHTML = `<svg width="12" height="10" viewBox="0 0 12 10" fill="none">
        <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
      check.onclick = (e) => { e.stopPropagation(); toggleDone(todo.id); };

      const body = document.createElement('div');
      body.className = 'todo-body';

      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = todo.text;
      body.appendChild(text);

      const dl = formatDeadline(todo.deadline);
      const ac = formatAction(todo.action_start, todo.action_duration_minutes);
      const meta = document.createElement('div');
      meta.className = 'todo-meta';

      const dlChip = document.createElement('span');
      dlChip.className = dl ? 'dl-chip ' + dl.cls : 'dl-chip dl-empty';
      dlChip.textContent = dl ? dl.label : 'No deadline';
      meta.appendChild(dlChip);

      const acChip = document.createElement('span');
      acChip.className = ac ? 'action-chip' : 'action-chip action-empty';
      acChip.textContent = ac || 'No action';
      meta.appendChild(acChip);

      if (todo.dread) {
        const dc = dreadColor(todo.dread);
        const dreadChip = document.createElement('span');
        dreadChip.className = 'dread-chip';
        dreadChip.style.background = dc.bg;
        dreadChip.style.color = dc.text;
        dreadChip.textContent = 'Dread ' + todo.dread;
        meta.appendChild(dreadChip);
      }

      body.appendChild(meta);

      const band = staleBand(todo.touched_at || todo.created_at);
      const badge = document.createElement('span');
      badge.className = 'stale-badge ' + band.cls;
      badge.textContent = band.label;

      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.onclick = (e) => { e.stopPropagation(); deleteTodo(todo.id); };

      div.onclick = () => showDetail(todo.id);

      div.appendChild(check);
      div.appendChild(body);
      div.appendChild(badge);
      div.appendChild(del);
      container.appendChild(div);
    });
  }

  async function toggleDone(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const newDone = !todo.done;
    todo.done = newDone;
    renderList();
    renderRecents();
    const now = new Date().toISOString();
    todo.touched_at = now;
    const { error } = await db.from('todos').update({ done: newDone, touched_at: now }).eq('id', id);
    if (error) { todo.done = !newDone; renderList(); renderRecents(); }
  }

  async function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    sessionRecents = sessionRecents.filter(r => r !== id);
    renderList();
    renderRecents();
    const { error } = await db.from('todos').delete().eq('id', id);
    if (error) console.error(error);
  }

  let detailId = null;

  function showDetail(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    detailId = id;

    const textEl = document.getElementById('det-text');
    textEl.value = todo.text;
    textEl.style.height = 'auto';
    textEl.style.height = Math.min(textEl.scrollHeight, 200) + 'px';

    const doneBtn = document.getElementById('det-done-btn');
    doneBtn.textContent = todo.done ? 'Mark not done' : 'Mark done';
    doneBtn.classList.toggle('is-done', todo.done);

    document.getElementById('det-deadline').value = todo.deadline || '';

    if (todo.action_start) {
      const d = new Date(todo.action_start);
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 16);
      document.getElementById('det-action-start').value = local;
    } else {
      document.getElementById('det-action-start').value = '';
    }

    document.getElementById('det-duration').value = todo.action_duration_minutes || '';

    const dread = todo.dread || 0;
    document.getElementById('det-dread').value = dread;
    updateDreadSlider(dread);

    const notesEl = document.getElementById('det-notes');
    notesEl.value = todo.notes || '';
    notesEl.style.height = 'auto';
    notesEl.style.height = Math.min(notesEl.scrollHeight, 200) + 'px';

    showView('detail');
  }

  function toggleDetailDone() {
    const todo = todos.find(t => t.id === detailId);
    if (!todo) return;
    todo.done = !todo.done;
    const doneBtn = document.getElementById('det-done-btn');
    doneBtn.textContent = todo.done ? 'Mark not done' : 'Mark done';
    doneBtn.classList.toggle('is-done', todo.done);
  }

  async function saveDetail() {
    const todo = todos.find(t => t.id === detailId);
    if (!todo) return;

    const text = document.getElementById('det-text').value.trim();
    if (!text) return;

    const deadlineVal = document.getElementById('det-deadline').value;
    const actionStartVal = document.getElementById('det-action-start').value;
    const durationVal = document.getElementById('det-duration').value;
    const now = new Date().toISOString();

    const dreadVal = parseInt(document.getElementById('det-dread').value, 10) || 0;

    const patch = {
      text,
      done: todo.done,
      touched_at: now,
      deadline: deadlineVal || null,
      action_start: actionStartVal ? new Date(actionStartVal).toISOString() : null,
      action_duration_minutes: durationVal ? parseInt(durationVal, 10) : null,
      dread: dreadVal,
      notes: document.getElementById('det-notes').value.trim() || null,
    };

    Object.assign(todo, patch);
    const { error } = await db.from('todos').update(patch).eq('id', detailId);
    if (error) { console.error(error); return; }

    showView('list');
  }

  async function deleteFromDetail() {
    if (!detailId) return;
    await deleteTodo(detailId);
    detailId = null;
    showView('list');
  }

  init();
</script>
</body>
</html>
