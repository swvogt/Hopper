<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e2e2dc;
      --text: #1a1a1a;
      --muted: #888880;
      --accent: #1a1a1a;
      --done-bg: #f0f0ec;
      --done-text: #aaa;
      --danger: #d44;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
    }

    /* ── VIEWS ── */
    .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .view.active { display: flex; }

    /* ── ADD SCREEN ── */
    #view-add {
      justify-content: center;
      padding: 0 24px;
      gap: 0;
    }

    .add-box {
      display: flex;
      gap: 8px;
    }

    .add-box textarea {
      flex: 1;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 17px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      outline: none;
      background: var(--surface);
      color: var(--text);
      min-height: 54px;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color .15s;
    }

    .add-box textarea:focus { border-color: var(--accent); }
    .add-box textarea::placeholder { color: var(--muted); }

    .add-box button {
      align-self: flex-end;
      padding: 0 20px;
      height: 54px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .add-box button:active { opacity: .75; }

    /* ── RECENTS (below input) ── */
    .recents-wrap {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 40dvh;
      overflow-y: auto;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .recent-list { display: flex; flex-direction: column; gap: 6px; }

    .recent-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
    }

    .recent-item.done-item { color: var(--done-text); text-decoration: line-through; background: var(--done-bg); }

    /* list link */
    .list-link {
      margin-top: 20px;
      text-align: center;
    }

    .list-link button {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color .15s;
    }

    .list-link button:hover { color: var(--text); }

    /* ── LIST SCREEN ── */
    #view-list {
      padding: 0;
    }

    .list-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .list-header button.back {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .list-header h1 {
      font-size: 17px;
      font-weight: 600;
      flex: 1;
    }

    .todo-list { display: flex; flex-direction: column; gap: 8px; padding: 16px; flex: 1; overflow-y: auto; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: background .15s;
    }

    .todo-item.done { background: var(--done-bg); }

    .todo-item .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      margin-top: 1px;
    }

    .todo-item.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check svg { display: none; }
    .todo-item.done .check svg { display: block; }

    .todo-item .text {
      flex: 1;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      transition: color .15s;
    }

    .todo-item.done .text {
      color: var(--done-text);
      text-decoration: line-through;
    }

    .todo-item .del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 18px;
      line-height: 1;
      border-radius: 6px;
      transition: color .15s;
      flex-shrink: 0;
    }

    .todo-item .del:hover { color: var(--danger); }

    .empty-hint {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 32px 0;
    }
  </style>
</head>
<body>

<!-- ADD VIEW -->
<div id="view-add" class="view active">
  <div class="add-box">
    <textarea id="input" placeholder="What do you need to do?" rows="1" oninput="autosize(this)" onkeydown="enterAdd(event)"></textarea>
    <button onclick="addTodo()">Add</button>
  </div>

  <div class="recents-wrap" id="recents-wrap" style="display:none">
    <span class="section-label">Recents</span>
    <div class="recent-list" id="recents"></div>
  </div>

  <div class="list-link">
    <button onclick="showView('list', this)">See all todos →</button>
  </div>
</div>

<!-- LIST VIEW -->
<div id="view-list" class="view">
  <div class="list-header">
    <button class="back" onclick="showView('add', this)">←</button>
    <h1>All Todos</h1>
  </div>
  <div class="todo-list" id="all-list">
    <p class="empty-hint" id="list-empty">No todos yet.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const db = createClient(
    'https://vsliqkdgurlthdvoadnq.supabase.co',
    'sb_publishable_ElNfnqKQC2ClGiMbXgWssw_KrhW-119'
  );

  let todos = [];
  let sessionRecents = [];

  async function init() {
    const { data, error } = await db
      .from('todos')
      .select('*')
      .order('created_at', { ascending: false });
    if (!error) todos = data ?? [];
    renderRecents();
  }

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (name === 'list') renderList();
    if (name === 'add') renderRecents();
  }

  function autosize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function enterAdd(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTodo(); }
  }

  async function addTodo() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';

    const { data, error } = await db
      .from('todos')
      .insert({ text, done: false })
      .select()
      .single();
    if (error) { console.error(error); return; }

    todos.unshift(data);
    sessionRecents.unshift(data.id);
    renderRecents();
  }

  function renderRecents() {
    const wrap = document.getElementById('recents-wrap');
    const container = document.getElementById('recents');
    const items = sessionRecents.map(id => todos.find(t => t.id === id)).filter(Boolean);

    if (items.length === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'flex';
    container.innerHTML = '';
    items.forEach(todo => {
      const div = document.createElement('div');
      div.className = 'recent-item' + (todo.done ? ' done-item' : '');
      div.textContent = todo.text;
      container.appendChild(div);
    });
  }

  function renderList() {
    const container = document.getElementById('all-list');
    const empty = document.getElementById('list-empty');
    container.querySelectorAll('.todo-item').forEach(n => n.remove());

    if (todos.length === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';

    todos.forEach(todo => {
      const div = document.createElement('div');
      div.className = 'todo-item' + (todo.done ? ' done' : '');

      const check = document.createElement('button');
      check.className = 'check';
      check.innerHTML = `<svg width="12" height="10" viewBox="0 0 12 10" fill="none">
        <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
      check.onclick = () => toggleDone(todo.id);

      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = todo.text;

      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '×';
      del.onclick = () => deleteTodo(todo.id);

      div.appendChild(check);
      div.appendChild(text);
      div.appendChild(del);
      container.appendChild(div);
    });
  }

  async function toggleDone(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    const newDone = !todo.done;
    todo.done = newDone;
    renderList();
    renderRecents();
    const { error } = await db.from('todos').update({ done: newDone }).eq('id', id);
    if (error) { todo.done = !newDone; renderList(); renderRecents(); }
  }

  async function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    sessionRecents = sessionRecents.filter(r => r !== id);
    renderList();
    renderRecents();
    const { error } = await db.from('todos').delete().eq('id', id);
    if (error) console.error(error);
  }

  init();
</script>
</body>
</html>
