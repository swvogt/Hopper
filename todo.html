<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #e2e2dc;
      --text: #1a1a1a;
      --muted: #888880;
      --accent: #1a1a1a;
      --done-bg: #f0f0ec;
      --done-text: #aaa;
      --danger: #d44;
      --radius: 12px;
      --tab-h: 56px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── TABS ── */
    nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav button {
      flex: 1;
      height: var(--tab-h);
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    nav button.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    /* ── VIEWS ── */
    .view { display: none; flex: 1; flex-direction: column; padding: 20px 16px; gap: 16px; }
    .view.active { display: flex; }

    /* ── ADD SCREEN ── */
    .add-box {
      display: flex;
      gap: 8px;
    }

    .add-box textarea {
      flex: 1;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      line-height: 1.4;
      outline: none;
      background: var(--surface);
      color: var(--text);
      min-height: 52px;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color .15s;
    }

    .add-box textarea:focus { border-color: var(--accent); }
    .add-box textarea::placeholder { color: var(--muted); }

    .add-box button {
      align-self: flex-end;
      padding: 0 18px;
      height: 52px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .add-box button:active { opacity: .75; }

    /* ── RECENTS ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .recent-list { display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; }

    .recent-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
    }

    .recent-item.done-item { color: var(--done-text); text-decoration: line-through; background: var(--done-bg); }

    .empty-hint {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      padding: 24px 0;
    }

    /* ── ALL LIST ── */
    .todo-list { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      transition: background .15s;
    }

    .todo-item.done { background: var(--done-bg); }

    .todo-item .check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: none;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      margin-top: 1px;
    }

    .todo-item.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check svg { display: none; }
    .todo-item.done .check svg { display: block; }

    .todo-item .text {
      flex: 1;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      transition: color .15s;
    }

    .todo-item.done .text {
      color: var(--done-text);
      text-decoration: line-through;
    }

    .todo-item .del {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 18px;
      line-height: 1;
      border-radius: 6px;
      transition: color .15s;
      flex-shrink: 0;
    }

    .todo-item .del:hover { color: var(--danger); }
  </style>
</head>
<body>

<nav>
  <button class="active" onclick="showView('add')">Add</button>
  <button onclick="showView('list')">All Todos</button>
</nav>

<!-- ADD VIEW -->
<div id="view-add" class="view active">
  <div class="add-box">
    <textarea id="input" placeholder="Describe a todo or goal…" rows="1" oninput="autosize(this)" onkeydown="enterAdd(event)"></textarea>
    <button onclick="addTodo()">Add</button>
  </div>

  <span class="section-label">Recents</span>

  <div class="recent-list" id="recents">
    <p class="empty-hint" id="recents-empty">Nothing added yet.</p>
  </div>
</div>

<!-- LIST VIEW -->
<div id="view-list" class="view">
  <div class="todo-list" id="all-list">
    <p class="empty-hint" id="list-empty">No todos yet. Add one!</p>
  </div>
</div>

<script>
  const STORAGE_KEY = 'hopper_todos';

  let todos = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  // Session-scoped recents (cleared when page refreshes)
  let sessionRecents = [];

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'list') renderList();
    if (name === 'add') renderRecents();
  }

  function autosize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function enterAdd(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTodo(); }
  }

  function addTodo() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;
    const todo = { id: Date.now(), text, done: false };
    todos.unshift(todo);
    sessionRecents.unshift(todo.id);
    save();
    input.value = '';
    input.style.height = 'auto';
    renderRecents();
  }

  function renderRecents() {
    const container = document.getElementById('recents');
    const empty = document.getElementById('recents-empty');
    const items = sessionRecents
      .map(id => todos.find(t => t.id === id))
      .filter(Boolean);

    if (items.length === 0) {
      empty.style.display = '';
      container.querySelectorAll('.recent-item').forEach(n => n.remove());
      return;
    }
    empty.style.display = 'none';
    container.querySelectorAll('.recent-item').forEach(n => n.remove());
    items.forEach(todo => {
      const div = document.createElement('div');
      div.className = 'recent-item' + (todo.done ? ' done-item' : '');
      div.textContent = todo.text;
      container.appendChild(div);
    });
  }

  function renderList() {
    const container = document.getElementById('all-list');
    const empty = document.getElementById('list-empty');
    container.querySelectorAll('.todo-item').forEach(n => n.remove());

    if (todos.length === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';

    todos.forEach(todo => {
      const div = document.createElement('div');
      div.className = 'todo-item' + (todo.done ? ' done' : '');
      div.dataset.id = todo.id;

      const check = document.createElement('button');
      check.className = 'check';
      check.setAttribute('aria-label', todo.done ? 'Mark undone' : 'Mark done');
      check.innerHTML = `<svg width="12" height="10" viewBox="0 0 12 10" fill="none">
        <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
      check.onclick = () => toggleDone(todo.id);

      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = todo.text;

      const del = document.createElement('button');
      del.className = 'del';
      del.setAttribute('aria-label', 'Delete');
      del.textContent = '×';
      del.onclick = () => deleteTodo(todo.id);

      div.appendChild(check);
      div.appendChild(text);
      div.appendChild(del);
      container.appendChild(div);
    });
  }

  function toggleDone(id) {
    const todo = todos.find(t => t.id === id);
    if (!todo) return;
    todo.done = !todo.done;
    save();
    renderList();
    renderRecents();
  }

  function deleteTodo(id) {
    todos = todos.filter(t => t.id !== id);
    sessionRecents = sessionRecents.filter(r => r !== id);
    save();
    renderList();
    renderRecents();
  }

  renderRecents();
</script>
</body>
</html>
